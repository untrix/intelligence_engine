{% extends "base.html" %}

{% block title %}Integrations - Intelligence Engine{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">
            <i class="bi bi-plug me-2"></i>Integrations
        </h1>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <i class="bi bi-tools me-2"></i>Inbuilt Tools
        </div>
        <div class="card-body">
            <div class="list-group list-group-flush">
                {% for tool in tools %}
                <div class="list-group-item px-0">
                    <h2 class="h6 mb-1">
                        <code>{{ tool.name }}</code>
                    </h2>
                    <p class="mb-0 text-muted">{{ tool.description }}</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="card shadow-sm mt-4">
        <div class="card-header bg-dark text-white">
            <i class="bi bi-hdd-network me-2"></i>MCP Tools
        </div>
        <div class="card-body text-muted">
            To be added
        </div>
    </div>
</div>
{% endblock %}
