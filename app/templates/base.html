<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Intelligence Engine{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar" class="bg-dark text-white d-flex flex-column" style="width: 250px; min-height: 100vh;">
            <div class="p-3">
                <h5 class="mb-0">
                    <i class="bi bi-cpu-fill me-2"></i>Intelligence Engine
                </h5>
                <small class="text-secondary">Agents Platform PoC</small>
            </div>
            <hr class="text-secondary my-0">
            <ul class="nav flex-column p-2">
                <li class="nav-item">
                    <a class="nav-link text-white {% if active_page == 'dashboard' %}fw-bold bg-secondary bg-opacity-25 rounded{% endif %}"
                       href="/">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item mt-2">
                    <small class="text-secondary text-uppercase px-3 fw-semibold" style="font-size: 0.7rem;">System</small>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white {% if active_page == 'settings' %}fw-bold bg-secondary bg-opacity-25 rounded{% endif %}"
                       href="/settings">
                        <i class="bi bi-gear me-2"></i>Settings
                    </a>
                </li>
            </ul>
            <div class="p-2 mt-auto">
                <hr class="text-secondary">
                <button
                    class="btn btn-outline-danger btn-sm w-100"
                    hx-post="/shutdown"
                    hx-confirm="Shut down the server? You will need to restart it manually."
                    hx-swap="none"
                >
                    <i class="bi bi-power me-1"></i>Shutdown Server
                </button>
            </div>
        </nav>

        <!-- Main content -->
        <div class="flex-grow-1">
            <main class="p-4">
                <!-- Toast container for notifications -->
                <div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container"></div>

                <!-- Flash messages -->
                {% if flash_message %}
                <div class="alert alert-{{ flash_type|default('info') }} alert-dismissible fade show" role="alert">
                    {{ flash_message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endif %}

                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/js/app.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
